name: Feature Request / 功能建议
description: 提出一个新功能建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你想解决的问题和建议的方案。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 你想解决什么问题？为什么需要这个功能？
      placeholder: 当我需要...的时候，目前只能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你建议如何实现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献
      options:
        - label: 我愿意自己提交 PR 实现这个功能

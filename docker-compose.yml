services:
  wechat-bridge:
    build: .
    container_name: wechat-bridge
    restart: unless-stopped
    ports:
      - "5200:5200"
    volumes:
      - ./data:/data
    environment:
      - PORT=5200
      - TOKEN_FILE=/data/token.json
      - CONTACTS_FILE=/data/contacts.json
      - WEBHOOK_URL=  # 可选：收到消息时主动 POST 推送的目标地址（例如 Dify/FastGPT Webhook）
      - API_TOKEN=    # 可选：API 接口鉴权 Token，设置后需要 Bearer Token 才能调用 /api/send 等接口
      - TZ=Asia/Shanghai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
